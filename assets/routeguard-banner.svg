<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4b4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4b4;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d4b4;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00d4b4;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/><line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/><line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>
  <!-- Glow circle -->
  <circle cx="250" cy="150" r="180" fill="#00d4b4" opacity="0.04"/>
  <circle cx="950" cy="150" r="120" fill="#3b82f6" opacity="0.03"/>
  <!-- Route lines -->
  <path d="M100,200 Q300,100 500,180 T900,120" fill="none" stroke="url(#accent)" stroke-width="2" stroke-dasharray="8,6" opacity="0.4"/>
  <path d="M150,220 Q400,140 650,200 T1050,140" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,8" opacity="0.25"/>
  <!-- Route dots -->
  <circle cx="100" cy="200" r="4" fill="#00d4b4" opacity="0.8"/>
  <circle cx="500" cy="180" r="5" fill="#00d4b4" opacity="0.9"/>
  <circle cx="900" cy="120" r="4" fill="#00d4b4" opacity="0.7"/>
  <circle cx="300" cy="140" r="3" fill="#f59e0b" opacity="0.6"/>
  <circle cx="700" cy="155" r="3" fill="#ef4444" opacity="0.5"/>
  <!-- Shield icon -->
  <g transform="translate(460, 70)">
    <path d="M30,5 L55,15 L55,40 C55,60 42,72 30,78 C18,72 5,60 5,40 L5,15 Z" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <path d="M22,42 L28,48 L40,34" fill="none" stroke="#00d4b4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Title -->
  <text x="530" y="115" font-family="'Segoe UI','Arial',sans-serif" font-size="48" font-weight="800" fill="url(#accent)" letter-spacing="3">RouteGuard</text>
  <!-- Subtitle -->
  <text x="530" y="148" font-family="'Segoe UI','Arial',sans-serif" font-size="15" fill="#94a3b8" letter-spacing="1">AI-POWERED LOGISTICS RISK MANAGEMENT</text>
  <!-- Bottom accent line -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#accent)" opacity="0.6"/>
  <!-- Tech badges -->
  <g transform="translate(530, 170)">
    <rect x="0" y="0" width="64" height="22" rx="4" fill="#009688" opacity="0.2"/>
    <text x="32" y="15" font-family="'Segoe UI',sans-serif" font-size="10" fill="#009688" text-anchor="middle" font-weight="600">FastAPI</text>
    <rect x="74" y="0" width="52" height="22" rx="4" fill="#61DAFB" opacity="0.15"/>
    <text x="100" y="15" font-family="'Segoe UI',sans-serif" font-size="10" fill="#61DAFB" text-anchor="middle" font-weight="600">React</text>
    <rect x="136" y="0" width="46" height="22" rx="4" fill="#F7931E" opacity="0.15"/>
    <text x="159" y="15" font-family="'Segoe UI',sans-serif" font-size="10" fill="#F7931E" text-anchor="middle" font-weight="600">ML</text>
    <rect x="192" y="0" width="82" height="22" rx="4" fill="#316192" opacity="0.2"/>
    <text x="233" y="15" font-family="'Segoe UI',sans-serif" font-size="10" fill="#7db8e8" text-anchor="middle" font-weight="600">PostgreSQL</text>
    <rect x="284" y="0" width="58" height="22" rx="4" fill="#199900" opacity="0.15"/>
    <text x="313" y="15" font-family="'Segoe UI',sans-serif" font-size="10" fill="#4ade80" text-anchor="middle" font-weight="600">Leaflet</text>
  </g>
</svg>
